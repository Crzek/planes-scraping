services:
  vuelos-app:
    build:
      context: ../ # Path: docker/
      dockerfile: docker/Dockerfile-playwright
    image: vuelos-private-radar:1.1-pw-container # Name of the image
    container_name: dev-vuelos-private-radar-pw-container
    ports:
      - "5000:5000"
      # environment:
      # - PYTHONUNBUFFERED=1 # para mostrar los logs en tiempo real
      # - ENV_FILE=chrome.env
    env_file:
      - ../.env.chrome
    volumes:
      - ../:/app
    # command: [ "gunicorn", "-w", "${WORKERS:-2}", "-b", "0.0.0.0:${PORT:-5000}", "--timeout", "${TIMEOUT:-120}", "--capture-output", "--enable-stdio-inheritance", "main:app" ]
    command: [ "sleep", "infinity" ]
